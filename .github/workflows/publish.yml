name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: mdz-core.slnx
  PROJECT_PATH: src/mdzip-core/mdzip-core.csproj

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Read project version
        id: version
        shell: bash
        run: |
          VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' "${{ env.PROJECT_PATH }}")"
          if [[ -z "$VERSION" ]]; then
            echo "Failed to read <Version> from ${{ env.PROJECT_PATH }}"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using package version: ${VERSION}"

      - name: Validate tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PROJECT_VERSION="${{ steps.version.outputs.version }}"
          if [[ "$TAG_VERSION" != "$PROJECT_VERSION" ]]; then
            echo "Tag version '$TAG_VERSION' does not match project version '$PROJECT_VERSION'."
            exit 1
          fi

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Detect test projects
        id: tests
        shell: bash
        run: |
          if find . -type f -name "*Tests*.csproj" | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        if: steps.tests.outputs.has_tests == 'true'
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build

      - name: Pack
        run: dotnet pack ${{ env.PROJECT_PATH }} --configuration Release -o out -p:Version=${{ steps.version.outputs.version }} --no-build

      - name: Publish package to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -z "$NUGET_API_KEY" ]]; then
            echo "NUGET_API_KEY is not configured. Add it in repository Settings > Secrets and variables > Actions."
            exit 1
          fi
          dotnet nuget push out/*.nupkg \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: out/*.nupkg
